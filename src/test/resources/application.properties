# Test-only overrides — never used in production.
spring.ai.openai.api-key=test-dummy-key
ai-gateway.rate-limit.enabled=false
ai-gateway.cache.enabled=false
ai-gateway.tts.deepgram.api-key=test-dummy-voice-key

# Lazy-connecting reactive driver — won't fail context load even if there's no Mongo.
spring.mongodb.uri=mongodb://localhost:27017/aigateway-test
spring.data.mongodb.auto-index-creation=false
management.health.mongodb.enabled=false
