# Railway deployment config — uses the Dockerfile in this repo.
# Docs: https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Use the Dockerfile's ENTRYPOINT (it already wraps `java $JAVA_OPTS -jar …` in `sh -c`,
# which Railway's bare `exec` start-command does not do).
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/actuator/health"
healthcheckTimeout = 30
